services:
  - type: web
    name: find-a-rent
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false          # 從 Render dashboard 手動填入
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GCP_SERVICE_ACCOUNT_FILE
        value: service_account.json
      - key: SHEET_NAME
        value: houses
      - key: REGION
        value: "1"
      - key: SECTION
        value: ""
      - key: PRICE_MIN
        value: "0"
      - key: PRICE_MAX
        value: "0"
      - key: MAX_PAGES
        value: "5"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /
